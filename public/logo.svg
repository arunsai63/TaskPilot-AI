<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" stroke="#1e293b" stroke-width="2"/>
  <!-- Progress arc (~270deg, indigo) -->
  <circle cx="32" cy="32" r="22"
    stroke="#6366f1" stroke-width="2.5"
    stroke-dasharray="104 34"
    stroke-dashoffset="-8"
    stroke-linecap="round"
    transform="rotate(-90 32 32)"/>
  <!-- Inner filled circle -->
  <circle cx="32" cy="32" r="14" fill="#1e293b"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="20" x2="32" y2="24" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="32" y2="44" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="32" x2="24" y2="32" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="44" y2="32" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#6366f1"/>
  <!-- Pilot needle -->
  <path d="M32 32 L27 22 L32 25 L37 22 Z" fill="#a5b4fc"/>
</svg>
